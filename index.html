<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breeze Drilling – Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --dark: #0a0e14;
      --mid: #111720;
      --light: #e8dfc8;
      --glow: rgba(200, 210, 220, 0.6);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--light);
      font-family: 'Raleway', sans-serif;
      overflow: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 10%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,168,76,0.05) 0%, transparent 60%);
      z-index: 0;
    }

    /* Grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 20px;
    }

    /* Logo ring */
    .logo-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 48px;
    }

    /* Spinning outer ring */
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid transparent;
      background: conic-gradient(from 0deg, var(--white), transparent 60%, var(--white)) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
      animation: spin 3s linear infinite;
    }

    .ring-2 {
      inset: 12px;
      animation: spin-reverse 5s linear infinite;
      opacity: 0.4;
    }

    /* Glow pulse */
    .glow-circle {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* Logo image */
    .logo-img {
      position: relative;
      width: 120px;
      height: 120px;
      object-fit: contain;
      animation: logo-spin 8s linear infinite;
      filter: drop-shadow(0 0 16px rgba(201,168,76,0.5));
    }

    /* Fallback if no logo: show initials */
    .logo-fallback {
      position: relative;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1a2030, #0d1520);
      border: 2px solid var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: logo-spin 8s linear infinite;
      filter: drop-shadow(0 0 16px rgba(201,168,76,0.5));
    }

    .logo-fallback span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--white);
      letter-spacing: 2px;
    }

    /* Brand name */
    .brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      letter-spacing: 0.18em;
      color: var(--light);
      text-align: center;
      line-height: 1;
      margin-bottom: 6px;
      animation: fade-up 1s ease 0.3s both;
    }

    .brand span {
      color: var(--white);
    }

    /* Divider */
    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--white), transparent);
      margin: 20px auto;
      animation: fade-up 1s ease 0.5s both;
    }

    /* Coming soon text */
    .coming-soon {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 3vw, 1.1rem);
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--white);
      text-align: center;
      animation: fade-up 1s ease 0.7s both, text-flicker 4s ease 2s infinite;
    }

    /* Subtitle */
    .subtitle {
      margin-top: 14px;
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      color: rgba(232, 223, 200, 0.4);
      text-align: center;
      text-transform: uppercase;
      animation: fade-up 1s ease 0.9s both;
    }

    /* Bottom dots */
    .dots {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 10px;
      animation: fade-up 1s ease 1.1s both;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--white);
      opacity: 0.3;
      animation: dot-pulse 1.8s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.3s; }
    .dot:nth-child(3) { animation-delay: 0.6s; }

    /* Keyframes */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes spin-reverse {
      to { transform: rotate(-360deg); }
    }
    @keyframes logo-spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.08); }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes text-flicker {
      0%, 95%, 100% { opacity: 1; }
      96% { opacity: 0.6; }
      97% { opacity: 1; }
      98% { opacity: 0.7; }
    }
    @keyframes dot-pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="logo-wrap">
      <div class="ring"></div>
      <div class="ring ring-2"></div>
      <div class="glow-circle"></div>

      <!--
        TO USE YOUR OWN LOGO:
        1. Upload your logo file (e.g. logo.png) to the same folder as this index.html
        2. Replace the .logo-fallback div below with:
           <img src="logo.png" alt="Breeze Drilling Logo" class="logo-img" />
      -->
      <div class="logo-fallback">
        <span>BD</span>
      </div>
    </div>

    <div class="brand">Breeze <span>Drilling</span></div>
    <div class="divider"></div>
    <div class="coming-soon">Coming Soon</div>
    <div class="subtitle">Are you ready?</div>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>
</body>
</html>
